devices: ({
    name: "Wireless Mouse MX Master 3";

    smartshift: {
        on: false;
        threshold: 200;
    };

    buttons: (
        // Molette = bascule de mode
        {
            cid: 0x52;
            action = {
                type: "ToggleSmartshift";
            };
        },

        // Bouton sous la molette = middle click
        {
            cid: 0xc4;
            action = {
                type: "Keypress";
                keys: ["BTN_MIDDLE"];
            };
        }
    );
});
